<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Trắc Nghiệm Quốc Phòng - An Ninh</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0056b3;
            margin-bottom: 20px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="text"], select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus, select:focus {
            border-color: #0056b3;
        }
        .toggle-btn {
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .toggle-btn.active {
            background: #28a745;
        }
        .toggle-btn:hover {
            opacity: 0.9;
        }
        .question-box {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #fafafa;
        }
        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .options label {
            display: block;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .options label:hover {
            background-color: #e9f5ff;
            border-color: #b3d7ff;
        }
        .options input {
            margin-right: 10px;
            transform: scale(1.2);
        }
        /* ĐÁP ÁN ĐÚNG MÀU ĐỎ IN ĐẬM */
        .show-answer .options .correct {
            color: #d32f2f;
            font-weight: bold;
            background-color: #ffebee;
            border: 1px solid #ef9a9a;
        }
        
        /* TRẠNG THÁI KHI CHẤM BÀI */
        .options .user-correct {
            background-color: #d4edda !important;
            border: 1px solid #c3e6cb !important;
            color: #155724;
            font-weight: bold;
        }
        .options .user-wrong {
            background-color: #f8d7da !important;
            border: 1px solid #f5c6cb !important;
            color: #721c24;
            font-weight: bold;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #0056b3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .submit-btn:hover {
            background: #004494;
        }
        #result {
            display: none;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            background: #e9ecef;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 ÔN TẬP TRẮC NGHIỆM QUỐC PHÒNG - AN NINH</h1>
    
    <div class="toolbar">
        <div class="controls">
            <input type="text" id="searchBox" placeholder="🔍 Tìm kiếm câu hỏi...">
            <select id="categoryFilter">
                <option value="all">Tất cả chuyên đề</option>
            </select>
        </div>
        <button class="toggle-btn" id="toggleAnswerBtn" onclick="toggleAnswers()">Bật hiển thị đáp án (Đỏ)</button>
    </div>

    <div id="result"></div>
    <form id="quizForm"></form>
    <button class="submit-btn" onclick="checkAnswers()">NỘP BÀI & CHẤM ĐIỂM</button>
</div>

        {cat: "An ninh mạng", q: "An ninh mạng là sự bảo đảm hoạt động trên không gian mạng như thế nào?", options: ["Gây phương hại đến an ninh quốc gia", "Không gây phương hại đến an ninh quốc gia, trật tự an toàn xã hội...", "Giới hạn bởi không gian và thời gian", "Chỉ phục vụ mục đích kinh tế"], correct: 1},

        {cat: "Nghệ thuật quân sự", q: "Chiến dịch Điện Biên Phủ 1954 là loại hình chiến dịch gì?", options: ["Phòng ngự", "Phản công", "Tiến công", "Nghi binh"], correct: 2},
        {cat: "Nghệ thuật quân sự", q: "Trong Điện Biên Phủ, ta đổi phương châm từ 'đánh nhanh' sang gì?", options: ["Đánh mạnh", "Đánh chắc, tiến chắc", "Đánh lén", "Đánh chạy"], correct: 1},

        // --- DÂN QUÂN TỰ VỆ ---
        {cat: "Dân quân tự vệ", q: "Lực lượng vũ trang quần chúng không thoát ly sản xuất là gì?", options: ["Bộ đội chủ lực", "Bộ đội địa phương", "Dân quân tự vệ", "Dự bị động viên"], correct: 2},
        {cat: "Dân quân tự vệ", q: "Độ tuổi tham gia Dân quân tự vệ trong thời bình (Nam, Nữ) là gì?", options: ["18-45, 18-35", "18-35, 18-25", "18-40, 18-30", "18-25, 18-20"], correct: 0},
        {cat: "Dân quân tự vệ", q: "Ai là người phát lệnh tổng động viên?", options: ["Tổng bí thư", "Chủ tịch nước", "Thủ tướng", "Bộ trưởng Bộ Quốc phòng"], correct: 1},

        // --- AN NINH QUỐC GIA ---
        {cat: "An ninh quốc gia", q: "Nội dung nào trong bảo vệ an ninh quốc gia là quan trọng nhất?", options: ["An ninh kinh tế", "An ninh biên giới", "An ninh chính trị nội bộ", "An ninh văn hóa"], correct: 2},
        {cat: "An ninh quốc gia", q: "Cơ quan chuyên trách bảo vệ an ninh biên giới đất liền là gì?", options: ["Công an Nhân dân", "Bộ đội Biên phòng", "Hải quan", "Dân quân tự vệ"], correct: 1}
    ];

    const form = document.getElementById('quizForm');
    const searchBox = document.getElementById('searchBox');
    const categoryFilter = document.getElementById('categoryFilter');
    const toggleBtn = document.getElementById('toggleAnswerBtn');
    let showAnswersMode = false;

    // Đổ dữ liệu vào Select chuyên đề
    const categories = [...new Set(quizData.map(item => item.cat))];
    categories.forEach(cat => {
        let option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        categoryFilter.appendChild(option);
    });

    function renderQuiz() {
        const searchText = searchBox.value.toLowerCase();
        const selectedCat = categoryFilter.value;

        const filteredData = quizData.filter(item => {
            const matchCat = (selectedCat === 'all') || (item.cat === selectedCat);
            const matchSearch = item.q.toLowerCase().includes(searchText) || item.options.join(" ").toLowerCase().includes(searchText);
            return matchCat && matchSearch;
        });

        form.innerHTML = '';
        if (filteredData.length === 0) {
            form.innerHTML = '<p style="text-align:center; color:red;">Không tìm thấy câu hỏi phù hợp.</p>';
            return;
        }

        filteredData.forEach((item, index) => {
            const qBox = document.createElement('div');
            qBox.className = 'question-box' + (showAnswersMode ? ' show-answer' : '');
            qBox.id = `q${index}`;
            
            let optionsHtml = item.options.map((opt, i) => `
                <label class="${i === item.correct ? 'correct' : ''}">
                    <input type="radio" name="q${index}" value="${i}"> ${opt}
                </label>
            `).join('');

            qBox.innerHTML = `
                <div class="question-text">Câu ${index + 1}: ${item.q}</div>
                <div class="options">
                    ${optionsHtml}
                </div>
            `;
            form.appendChild(qBox);
        });
    }

    function toggleAnswers() {
        showAnswersMode = !showAnswersMode;
        if (showAnswersMode) {
            toggleBtn.classList.add('active');
            toggleBtn.innerText = "Tắt hiển thị đáp án";
        } else {
            toggleBtn.classList.remove('active');
            toggleBtn.innerText = "Bật hiển thị đáp án (Đỏ)";
        }
        renderQuiz(); // Render lại để áp dụng CSS màu đỏ
    }

    function checkAnswers() {
        let score = 0;
        const questions = document.querySelectorAll('.question-box');
        
        questions.forEach(qBox => {
            const index = qBox.id.replace('q', '');
            const correctIndex = quizData[index].correct;
            const labels = qBox.querySelectorAll('.options label');
            const selectedInput = qBox.querySelector(`input[name="q${index}"]:checked`);

            // Xóa class cũ nếu có
            labels.forEach(label => label.classList.remove('user-correct', 'user-wrong'));

            if (selectedInput) {
                const selectedIndex = parseInt(selectedInput.value);
                if (selectedIndex === correctIndex) {
                    score++;
                    labels[selectedIndex].classList.add('user-correct');
                } else {
                    labels[selectedIndex].classList.add('user-wrong');
                    labels[correctIndex].classList.add('user-correct'); // Chỉ màu đỏ nếu sai
                }
            } else {
                // Nếu không chọn, vẫn hiện đáp án đúng
                labels[correctIndex].classList.add('user-correct');
            }
        });

        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `🎯 KẾT QUẢ: Bạn đạt <strong>${score}/${questions.length}</strong> câu đúng!`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    searchBox.addEventListener('input', renderQuiz);
    categoryFilter.addEventListener('change', renderQuiz);

    // Render lần đầu
    renderQuiz();
</script>

</body>
</html>
