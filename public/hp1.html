    <style>
        * {

        }
        body {

            background: #f0f4f8;
            padding: 20px;
        }
        .container {
            max-width: 900px;

            padding: 25px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 26px;
            border-bottom: 3px solid #2c3e50;
            padding-bottom: 12px;
            margin-bottom: 25px;
            color: #1a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            background: #e9edf2;
            padding: 15px 20px;
            border-radius: 12px;
            align-items: center;
        }
        .controls button {
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            background: #2c3e50;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .controls button:hover {
            background: #1a2a3a;
            transform: scale(0.97);
        }
        .controls .btn-show {
            background: #27ae60;
        }
        .controls .btn-show:hover {
            background: #1e8449;
        }
        .controls .btn-hide {
            background: #e67e22;
        }
        .controls .btn-hide:hover {
            background: #ca6f1e;
        }
        .controls .stats {
            margin-left: auto;
            font-weight: 600;
            color: #2c3e50;
        }
        .question-card {
            background: #fafcff;
            border-radius: 14px;
            padding: 18px 22px 22px 22px;
            margin-bottom: 22px;
            border-left: 6px solid #3498db;
            box-shadow: 0 3px 8px rgba(0,0,0,0.04);
            transition: 0.15s;
        }
        .question-card.correct {
            border-left-color: #27ae60;
            background: #f0fff4;
        }
        .question-card.wrong {
            border-left-color: #e74c3c;
            background: #fff5f5;
        }
        .question-number {
            font-weight: 700;
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        .question-text {
            font-size: 17px;
            line-height: 1.5;
            margin-bottom: 14px;
            font-weight: 500;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 6px;
        }
        .option {
            padding: 10px 16px;
            background: #ffffff;
            border: 2px solid #dce3ed;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .option:hover {
            background: #f2f6fc;
            border-color: #a0b8d4;
        }
        .option.selected {
            border-color: #2c3e50;
            background: #eef3fa;
        }
        .option.correct-answer {
            border-color: #27ae60;
            background: #d5f5e3;
        }
        .option.wrong-answer {
            border-color: #e74c3c;
            background: #fadbd8;
        }
        .option.reveal-correct {
            border-color: #27ae60;
            background: #d5f5e3;
        }
        .answer-feedback {
            margin-top: 12px;
            font-weight: 600;
            font-size: 15px;
            padding: 8px 14px;
            border-radius: 8px;
            display: inline-block;
        }
        .answer-feedback.correct {
            color: #1e8449;
            background: #d5f5e3;
        }
        .answer-feedback.wrong {
            color: #922b21;
            background: #fadbd8;
        }
        .answer-feedback.show-answer {
            color: #1a2a3a;
            background: #fef9e7;
            border: 1px solid #f1c40f;
        }
        .correct-label {
            color: #c0392b;
            font-weight: 700;
            margin-left: 12px;
            font-size: 14px;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #7f8c8d;
            font-size: 14px;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .question-card { padding: 14px; }
            .controls { flex-direction: column; align-items: stretch; }
            .controls .stats { margin-left: 0; text-align: center; }
        }
    </style>
</head>

            card.appendChild(numDiv);

            const qDiv = document.createElement('div');
            qDiv.className = 'question-text';
            qDiv.textContent = q.question;
            card.appendChild(qDiv);

            const optDiv = document.createElement('div');
            optDiv.className = 'options';
            q.options.forEach((opt, oi) => {
                const optEl = document.createElement('div');
                optEl.className = 'option';
                optEl.textContent = opt;
                optEl.dataset.optIndex = oi;
                optEl.dataset.qIndex = idx;

                // Nếu đã chọn
                if (selected[idx] !== undefined && selected[idx] === oi) {
                    optEl.classList.add('selected');
                }
                // Nếu đang hiện đáp án
                if (revealed) {
                    if (oi === q.answer) {
                        optEl.classList.add('correct-answer');
                        optEl.style.borderColor = '#27ae60';
                    }
                    if (selected[idx] !== undefined && selected[idx] === oi && oi !== q.answer) {
                        optEl.classList.add('wrong-answer');
                        optEl.style.borderColor = '#e74c3c';
                    }
                    if (selected[idx] !== undefined && selected[idx] === oi && oi === q.answer) {
                        optEl.classList.add('correct-answer');
                        optEl.style.borderColor = '#27ae60';
                    }
                }

                optEl.addEventListener('click', function(e) {
                    if (revealed) return; // không cho chọn khi đang hiển thị đáp án
                    const qi = parseInt(this.dataset.qIndex);
                    const oi2 = parseInt(this.dataset.optIndex);
                    selectOption(qi, oi2);
                });

                optDiv.appendChild(optEl);
            });
            card.appendChild(optDiv);

            // Feedback
            const feedback = document.createElement('div');
            feedback.className = 'answer-feedback';
            feedback.id = 'fb-' + idx;
            if (selected[idx] !== undefined) {
                const isCorrect = (selected[idx] === q.answer);
                if (isCorrect) {
                    feedback.textContent = '✅ Đúng!';
                    feedback.classList.add('correct');
                    totalAnswered++;
                } else {
                    feedback.textContent = '❌ Sai! Đáp án đúng: ' + q.options[q.answer];
                    feedback.classList.add('wrong');
                }
            } else if (revealed) {
                feedback.textContent = '🔎 Đáp án đúng: ' + q.options[q.answer];
                feedback.classList.add('show-answer');
            }
            card.appendChild(feedback);

            // Nếu có đáp án đúng hiển thị sẵn (khi reveal)
            if (revealed && selected[idx] === undefined) {
                const hint = document.createElement('div');
                hint.style.marginTop = '8px';
                hint.style.color = '#c0392b';
                hint.style.fontWeight = '600';
                hint.textContent = '👉 Đáp án: ' + q.options[q.answer];
                card.appendChild(hint);
            }

            container.appendChild(card);
        });

        document.getElementById('totalCount').textContent = questions.length;
        document.getElementById('stats').textContent = `Đã chọn: ${totalAnswered} / ${questions.length}`;

        // highlight correct answer in red (additional)
        if (revealed) {
            document.querySelectorAll('.correct-answer').forEach(el => {
                el.style.color = '#c0392b';
                el.style.fontWeight = 'bold';
            });
        }
    }

    function selectOption(qIdx, optIdx) {
        if (revealed) return;
        selected[qIdx] = optIdx;
        render();
    }

    function showAllAnswers() {
        revealed = true;
        render();
    }

    function hideAllAnswers() {
        revealed = false;
        render();
    }

    function resetSelection() {
        selected = {};
        revealed = false;
        render();
    }

    // Initial render
    render();
</script>
</body>
</html>
